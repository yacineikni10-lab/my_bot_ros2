slam_toolbox:
  ros__parameters:
    # ROS Parameters
    odom_frame: odom
    base_frame: base_link
    scan_topic: /scan
    use_sim_time: true
    mode: mapping # لإنشاء خريطة جديدة

    # Matcher Parameters
    distance_threshold: 0.1
    angle_threshold: 0.1
    map_update_interval: 5.0
    resolution: 0.05
